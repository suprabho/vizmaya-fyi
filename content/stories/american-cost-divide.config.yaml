  # ═══════════════════════════════════════════════
  # ACT I CLUSTER — Two Maps (cost / quality / layered)
  # Each subsection swaps the choropleth so the eye sees both
  # dimensions and then the disagreement.
  # ═══════════════════════════════════════════════

  - id: cost-vs-quality-cluster
    map:
      center: [-98.5, 39.0]
      zoom: 3.4
      pitch: 0
      bearing: 0
      opacity: 0.55
    subsections:
      - text: "The Map of Cost"
        map:
          regions:
            level: custom
            geojsonUrl: "https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/united-states.geojson"
            idProperty: "name"
            ramp: [66000, 80000, 100000, 142000]
            colors: ["$teal", "$surface", "$amber", "$accent"]
            items:
              - { code: "Hawaii", value: 141127 }
              - { code: "Massachusetts", value: 118431 }
              - { code: "California", value: 107357 }
              - { code: "Alaska", value: 100289 }
              - { code: "New York", value: 99425 }
              - { code: "Maryland", value: 93378 }
              - { code: "New Jersey", value: 90001 }
              - { code: "Connecticut", value: 89608 }
              - { code: "Washington", value: 89451 }
              - { code: "Florida", value: 78142 }
              - { code: "Idaho", value: 77750 }
              - { code: "Texas", value: 71310 }
              - { code: "Tennessee", value: 70917 }
              - { code: "Mississippi", value: 67147 }
              - { code: "Oklahoma", value: 66284 }
              - { code: "Arkansas", value: 70132 }
              - { code: "West Virginia", value: 69189 }
              - { code: "Alabama", value: 69032 }
      - text: "The Map of Quality"
        map:
          regions:
            level: custom
            geojsonUrl: "https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/united-states.geojson"
            idProperty: "name"
            ramp: [40, 50, 56, 61]
            colors: ["$red", "$surface", "$amber", "$teal"]
            items:
              - { code: "Massachusetts", value: 60.2 }
              - { code: "Idaho", value: 60.2 }
              - { code: "New Jersey", value: 59.8 }
              - { code: "Wisconsin", value: 59.7 }
              - { code: "Minnesota", value: 58.7 }
              - { code: "Florida", value: 58.5 }
              - { code: "New Hampshire", value: 58.2 }
              - { code: "Utah", value: 57.9 }
              - { code: "New York", value: 57.9 }
              - { code: "Pennsylvania", value: 57.9 }
              - { code: "Wyoming", value: 57.9 }
              - { code: "Hawaii", value: 49.4 }
              - { code: "California", value: 50.5 }
              - { code: "Texas", value: 47.2 }
              - { code: "Tennessee", value: 47.0 }
              - { code: "South Carolina", value: 45.7 }
              - { code: "Nevada", value: 44.6 }
              - { code: "Alaska", value: 44.2 }
              - { code: "Mississippi", value: 43.5 }
              - { code: "Arkansas", value: 42.1 }
              - { code: "Louisiana", value: 40.6 }
              - { code: "New Mexico", value: 39.7 }
      - text: "Two Maps, Layered"
        map:
          regions:
            level: custom
            geojsonUrl: "https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/united-states.geojson"
            idProperty: "name"
            # Color by the agreement gap. Green = quality outruns cost (deals).
            # Red = cost outruns quality (traps). Surface = balanced (you pay, you get).
            items:
              # The deals — quality much better than cost would predict
              - { code: "Idaho", color: "$teal", opacity: 0.75 }
              - { code: "Florida", color: "$teal", opacity: 0.75 }
              - { code: "Wisconsin", color: "$teal", opacity: 0.55 }
              - { code: "Iowa", color: "$teal", opacity: 0.45 }
              - { code: "Wyoming", color: "$teal", opacity: 0.45 }
              - { code: "Pennsylvania", color: "$teal", opacity: 0.40 }
              # Balanced — high cost, high quality (you pay, you get)
              - { code: "Massachusetts", color: "$surface", opacity: 0.85 }
              - { code: "New Jersey", color: "$surface", opacity: 0.85 }
              - { code: "New Hampshire", color: "$surface", opacity: 0.85 }
              # The traps — cost outruns quality
              - { code: "Hawaii", color: "$red", opacity: 0.85 }
              - { code: "Alaska", color: "$red", opacity: 0.75 }
              - { code: "Nevada", color: "$red", opacity: 0.75 }
              - { code: "Washington", color: "$red", opacity: 0.55 }
              - { code: "California", color: "$red", opacity: 0.45 }
              # The bottom — cheap and underserved
              - { code: "Mississippi", color: "$amber", opacity: 0.55 }
              - { code: "Louisiana", color: "$amber", opacity: 0.55 }
              - { code: "Arkansas", color: "$amber", opacity: 0.55 }
              - { code: "New Mexico", color: "$amber", opacity: 0.55 }

  # ═══════════════════════════════════════════════
  # ACT II — the migration data (Florida → outflow)
