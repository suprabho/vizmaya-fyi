# Story config — american-cost-divide
#
# A wealth-vs-quality argument across U.S. states. The map carries the case:
# cost choropleth, then quality choropleth, then wealth-flow choropleth, then
# zooms into the two states that break the pattern (Florida and Idaho) and
# the trap states (Hawaii). Each text card holds ~1 paragraph; clusters of
# related cards share a map so the camera stays still while text advances.
#
# COORDINATES
#   Continental US center      [-98.5,  39.0]
#   Florida (Miami)            [-80.193, 25.762]
#   Florida center              [-83.0,  29.0]
#   Idaho (Boise)              [-116.200, 43.617]
#   Idaho center                [-114.7,  44.4]
#   Hawaii (Honolulu)          [-157.857, 21.307]
#   Hawaii center               [-157.0,  20.5]
#   Anchorage, AK              [-149.864, 61.218]
#   Las Vegas, NV              [-115.139, 36.169]
#   Seattle, WA                [-122.332, 47.606]
#
# CHOROPLETH RAMPS (codeforgermany US states geojson keyed by state name)
#   total cost ($): [66000, 80000, 100000, 142000]   teal → surface → amber → accent
#   grocery: [94, 100, 110, 132]   teal → surface → amber → accent
#   livability score: [40, 50, 56, 61]   red → surface → amber → teal
#   wealth flow ($B): [-12, 0, 5, 21]   red → surface → teal → positive

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#d96548"
  pinRadius: 10
  flySpeed: 1.2
  mapPalette:
    land: "#0d1521"
    water: "#06101a"
    border: "#243349"
    labelText: "#c8d1dc"
    labelHalo: "#06101a"

sections:

  # ═══════════════════════════════════════════════
  # HERO
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "The American Cost Divide"
    eyebrow: "Economy · April 2026"
    map:
      center: [-98.5, 39.0]
      zoom: 3.4
      pitch: 0
      bearing: 0
      opacity: 0.45
      mobile:
        center: [-98.5, 39.0]
        zoom: 2.6

  # ═══════════════════════════════════════════════
