  - id: florida-stat
    kind: stat
    text: "$21 Billion"
    map:
      center: [-83.0, 28.5]
      zoom: 5.4
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [-80.193, 25.762]
          label: "Florida · +$21B"
          pulse: true

  - id: where-money-going
    text: "Where the Money Is Going"
    chart: data:wealth-gainers
    map:
      center: [-92.0, 33.5]
      zoom: 3.6
      pitch: 0
      bearing: 0
      opacity: 0.55
      pins:
        - { coordinates: [-80.193, 25.762], label: "Florida · +$21B", labelAnchor: "right" }
        - { coordinates: [-97.743, 30.267], label: "Texas · +$6B" }
        - { coordinates: [-80.843, 35.227], label: "N. Carolina · +$4B", labelAnchor: "top" }
        - { coordinates: [-81.166, 33.836], label: "S. Carolina · +$4B", labelAnchor: "right" }
        - { coordinates: [-112.074, 33.448], label: "Arizona · +$3B", labelAnchor: "top" }
        - { coordinates: [-86.781, 36.162], label: "Tennessee · +$3B", labelAnchor: "top" }

  - id: where-money-leaving
    text: "Where the Money Is Leaving"
    chart: data:wealth-losers
    map:
      center: [-95.0, 39.0]
      zoom: 3.4
      pitch: 0
      bearing: 0
      opacity: 0.55
      pins:
        - { coordinates: [-119.418, 36.778], label: "California · -$12B", labelAnchor: "right" }
        - { coordinates: [-74.006, 40.713], label: "New York · -$10B", labelAnchor: "right" }
        - { coordinates: [-89.398, 40.633], label: "Illinois · -$6B", labelAnchor: "top" }
        - { coordinates: [-71.057, 42.361], label: "Mass. · -$4B", labelAnchor: "right" }
        - { coordinates: [-74.566, 40.220], label: "New Jersey · -$3B", labelAnchor: "right" }

  # ═══════════════════════════════════════════════
  # ACT III — THE REVELATION (the wealth migration is downhill)
  # ═══════════════════════════════════════════════

  - id: revelation-stat
    kind: stat
    text: "$18 Billion"
    map:
      center: [-95.0, 39.0]
      zoom: 3.4
      pitch: 0
      bearing: 0
      opacity: 0.55
      regions:
        level: custom
        geojsonUrl: "https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/united-states.geojson"
        idProperty: "name"
        # Highlight the top-10 livability states; their wealth flow color.
        items:
          - { code: "Massachusetts", color: "$accent", opacity: 0.80 }
          - { code: "Idaho", color: "$teal", opacity: 0.55 }
          - { code: "New Jersey", color: "$accent", opacity: 0.70 }
          - { code: "Wisconsin", color: "$muted", opacity: 0.45 }
          - { code: "Minnesota", color: "$accent", opacity: 0.50 }
          - { code: "Florida", color: "$positive", opacity: 0.85 }
          - { code: "Utah", color: "$teal", opacity: 0.45 }
          - { code: "New York", color: "$red", opacity: 0.85 }
          - { code: "Pennsylvania", color: "$accent", opacity: 0.55 }
          - { code: "Wyoming", color: "$teal", opacity: 0.40 }

  - id: wealth-downhill
    text: "The Wealth Migration Is Downhill"
    chart: data:livability-vs-flow
    map:
      center: [-95.0, 39.0]
      zoom: 3.4
      pitch: 0
      bearing: 0
      opacity: 0.45

  - id: sunbelt-floor
    text: "The Sun Belt's Quality Floor"
    chart: data:top-livable-bleeding
    map:
      center: [-95.0, 39.0]
      zoom: 3.4
      pitch: 0
      bearing: 0
      opacity: 0.45

  # ═══════════════════════════════════════════════
  # ACT IV — TWO EXCEPTIONS (Florida + Idaho)
  # ═══════════════════════════════════════════════

  - id: florida-cluster
    map:
      center: [-83.0, 28.5]
      zoom: 5.0
      pitch: 0
      bearing: 0
      opacity: 0.6
      pins:
        - coordinates: [-80.193, 25.762]
          label: "Florida · #6 livability · +$21B"
          pulse: true
      regions:
        level: custom
        geojsonUrl: "https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/united-states.geojson"
        idProperty: "name"
        items:
          - { code: "Florida", color: "$positive", opacity: 0.75 }
    subsections:
      - text: "Florida Is Alone"
      - text: "Why Florida Works"

  - id: idaho-cluster
    map:
      center: [-114.7, 44.4]
      zoom: 5.4
      pitch: 0
      bearing: 0
      opacity: 0.6
      pins:
        - coordinates: [-116.200, 43.617]
          label: "Idaho · #2 livability · +$1B"
          pulse: true
      regions:
        level: custom
        geojsonUrl: "https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/united-states.geojson"
        idProperty: "name"
        items:
          - { code: "Idaho", color: "$teal", opacity: 0.75 }
    subsections:
      - text: "The Idaho Paradox"
      - text: "The Scale Problem"
        map:
          # Pull back to show the population size disparity vs Florida
          center: [-100.0, 36.0]
          zoom: 3.6

  # ═══════════════════════════════════════════════
  # ACT V — THE TRAPS
  # ═══════════════════════════════════════════════

  - id: hawaii-section
    text: "The Hawaii Trade"
    map:
      center: [-157.0, 20.5]
      zoom: 6.0
      pitch: 0
      bearing: 0
      opacity: 0.6
      pins:
        - coordinates: [-157.857, 21.307]
          label: "Honolulu · cost #1 · livability #35"
          pulse: true
      regions:
        level: custom
        geojsonUrl: "https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/united-states.geojson"
        idProperty: "name"
        items:
          - { code: "Hawaii", color: "$red", opacity: 0.75 }

  - id: trap-states
    text: "Quality Without Quantity"
    map:
      center: [-115.0, 40.0]
      zoom: 3.6
      pitch: 0
      bearing: 0
      opacity: 0.55
      pins:
        - { coordinates: [-115.139, 36.169], label: "Nevada · cost mid · liv. #45", labelAnchor: "right" }
        - { coordinates: [-149.864, 61.218], label: "Alaska · cost #4 · liv. #46", labelAnchor: "right" }
        - { coordinates: [-122.332, 47.606], label: "Washington · cost top-10 · liv. #36", labelAnchor: "right" }
      regions:
        level: custom
        geojsonUrl: "https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/united-states.geojson"
        idProperty: "name"
        items:
          - { code: "Hawaii", color: "$red", opacity: 0.70 }
          - { code: "Alaska", color: "$red", opacity: 0.70 }
          - { code: "Nevada", color: "$red", opacity: 0.70 }
          - { code: "Washington", color: "$red", opacity: 0.50 }

  # ═══════════════════════════════════════════════
  # ACT VI — SYNTHESIS
  # ═══════════════════════════════════════════════

  - id: closing-cluster
    map:
      center: [-95.0, 39.0]
      zoom: 3.4
      pitch: 0
      bearing: 0
      opacity: 0.50
      regions:
        level: custom
        geojsonUrl: "https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/united-states.geojson"
        idProperty: "name"
        ramp: [-12, 0, 5, 21]
        colors: ["$red", "$surface", "$teal", "$positive"]
        items:
          - { code: "Florida", value: 21 }
          - { code: "Texas", value: 6 }
          - { code: "North Carolina", value: 4 }
          - { code: "South Carolina", value: 4 }
          - { code: "Arizona", value: 3 }
          - { code: "Tennessee", value: 3 }
          - { code: "Nevada", value: 2 }
          - { code: "Idaho", value: 1.0 }
          - { code: "California", value: -12 }
          - { code: "New York", value: -10 }
          - { code: "Illinois", value: -6 }
          - { code: "Massachusetts", value: -4 }
          - { code: "New Jersey", value: -3 }
          - { code: "Pennsylvania", value: -2 }
          - { code: "Ohio", value: -2 }
    subsections:
      - text: "What People Are Actually Buying"
      - text: "The Cascade"
      - text: "The Question Ahead"

  # ═══════════════════════════════════════════════
  # METHODOLOGY
  # ═══════════════════════════════════════════════

  - id: methodology
    text: "Methodology & sources"
    mobileParagraphs:
      - [0, 2]
      - [2, 4]
    map:
      center: [-95.0, 39.0]
      zoom: 3.4
      pitch: 0
      bearing: 0
      opacity: 0.40
