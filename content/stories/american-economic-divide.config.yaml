# Story config — american-economic-divide
#
# The reader walks through the economic divide across U.S. states.
# Act I opens on cost of living extremes (Hawaii vs Oklahoma).
# Act II moves through wealth migration patterns (Florida inflows, California outflows).
# Act III reveals the livability paradox: cheap states rank low, expensive states don't
# always rank high. The final beat pulls back to show the true reorganization underway.
#
# US STATE COORDINATES (approximate geographic centers):
#   Hawaii               -157.5, 20.8
#   Alaska               -151.0, 64.0
#   California           -119.4, 36.1
#   Texas                -99.0, 31.9
#   Florida              -81.5, 27.9
#   New York            -75.7, 42.9
#   Massachusetts        -71.8, 42.2
#   Arkansas            -92.3, 34.8
#   Mississippi         -89.6, 32.7
#   Oklahoma            -96.9, 35.5
#   South Carolina      -80.9, 33.8
#   North Carolina      -79.8, 35.6
#   Minnesota           -93.9, 45.7
#   Wisconsin           -89.6, 44.3
#   Idaho               -114.7, 44.4
#   Mountain West center: -107.0, 39.0
#   South/Southwest center: -93.0, 31.0

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.50
  pinColor: "#d9a84a"
  pinRadius: 10
  flySpeed: 1.2

