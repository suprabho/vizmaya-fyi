          label: "Oslo — krone +12.7%"
          color: "#d9a84a"
        - coordinates: [71.4491, 51.1694]
          label: "Astana — tenge +12.3%"
          color: "#d9a84a"
          labelAnchor: top
        - coordinates: [101.6869, 3.1390]
          label: "Kuala Lumpur — ringgit +11.2%"
          color: "#d9a84a"
          labelAnchor: bottom
      regions:
        level: country
        ramp: [10, 14]
        colors: ["$accent2", "$amber"]
        items:
          - code: "NO"
            value: 12.7
          - code: "KZ"
