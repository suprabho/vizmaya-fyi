defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#ff9f1c"
  pinRadius: 10
  flySpeed: 1.2
  highlightCountry: "IN"
  highlightColor: "#1a2639"

sections:
  - id: hero
    kind: hero
    text: "A New Political Map"
    map:
      center: [78.9629, 22.5937]
      zoom: 4.2
      pitch: 0
      bearing: 0
      opacity: 0.45

  - id: stat-850
    kind: stat
    text: "850"
    map:
      center: [77.2090, 28.6139]
      zoom: 9
      pitch: 25
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "Parliament of India, New Delhi"

  - id: conflict-intro
    text: "Who Gains and Who Loses"
    map:
      center: [78.9629, 22.5937]
      zoom: 4.2
      pitch: 0
      bearing: 0
      opacity: 0.45

  - id: gains-losses-chart
    text: "A Stark Divide"
    chart: data:state-gains-losses
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [78.9629, 22.5937]
      zoom: 4.2
      pitch: 0
      bearing: 0
      opacity: 0.55
      regions:
        level: custom
        geojsonUrl: "https://raw.githubusercontent.com/geohacker/india/master/state/india_state.geojson"
        idProperty: "ID_1"
        # Color is picked per-item (red for losers, green for gainers);
        # opacity is linearly proportional to |seat change| / 13 (the max).
        items:
          - code: "33"  # Uttar Pradesh  +13
            color: "$positive"
            opacity: 1.00
          - code: "5"   # Bihar          +10
            color: "$positive"
            opacity: 0.77
          - code: "29"  # Rajasthan       +8
            color: "$positive"
            opacity: 0.62
          - code: "20"  # Madhya Pradesh  +5
            color: "$positive"
            opacity: 0.38
          - code: "10"  # Delhi           +5
            color: "$positive"
            opacity: 0.38
          - code: "2"   # Andhra Pradesh  -5
            color: "$red"
            opacity: 0.38
          - code: "18"  # Kerala          -8
            color: "$red"
            opacity: 0.62
          - code: "31"  # Tamil Nadu     -11
            color: "$red"
            opacity: 0.85

  - id: heartland-gains
    text: "The Hindi Heartland: Overwhelming Beneficiaries"
    map:
      center: [78.0, 26.0]
      zoom: 5.0
      pitch: 20
      bearing: 0
      opacity: 0.6
      regions:
        level: custom
        geojsonUrl: "https://raw.githubusercontent.com/geohacker/india/master/state/india_state.geojson"
        idProperty: "ID_1"
        ramp: [0, 13]
        colors: ["$surface", "$positive"]
        items:
          - code: "33"  # Uttar Pradesh
            value: 13
          - code: "5"   # Bihar
            value: 10
          - code: "29"  # Rajasthan
            value: 8
          - code: "20"  # Madhya Pradesh
            value: 5
          - code: "10"  # Delhi
            value: 5

  - id: south-cedes
    text: "The South: A Sharp Erosion"
    map:
      center: [78.5, 15.0]
      zoom: 5.0
      pitch: 20
      bearing: 0
      opacity: 0.6
      regions:
        level: custom
        geojsonUrl: "https://raw.githubusercontent.com/geohacker/india/master/state/india_state.geojson"
        idProperty: "ID_1"
        ramp: [-11, 0]
        colors: ["$red", "$surface"]
        items:
          - code: "31"  # Tamil Nadu
            value: -11
          - code: "18"  # Kerala
            value: -8
          - code: "2"   # Andhra Pradesh
            value: -5

  - id: regional-rebalance
    text: "A National Rebalancing"
    chart: data:regional-share-change
    map:
      center: [78.9629, 22.5937]
      zoom: 4.2
      pitch: 0
      bearing: 0
      opacity: 0.35

  - id: demographic-engine
    text: "The Demographic Roots"
    map:
      center: [78.9629, 22.5937]
      zoom: 4.2
      pitch: 0
      bearing: 0
      opacity: 0.45

  - id: tfr-map
    text: "A Tale of Two Fertility Rates"
    map:
      center: [78.9629, 22.5937]
      zoom: 4.2
      pitch: 0
      bearing: 0
      opacity: 0.6
      regions:
        level: custom
        geojsonUrl: "https://raw.githubusercontent.com/geohacker/india/master/state/india_state.geojson"
        idProperty: "ID_1"
        ramp: [1.5, 2.1, 3.0]
        colors: ["$positive", "$amber", "$red"]
        items:
          - code: "5"   # Bihar
            value: 3.0
          - code: "23"  # Meghalaya
            value: 2.9
          - code: "33"  # Uttar Pradesh
            value: 2.4
          - code: "16"  # Jharkhand
            value: 2.3
          - code: "31"  # Tamil Nadu
            value: 1.8
          - code: "18"  # Kerala
            value: 1.5
          - code: "2"   # Andhra Pradesh
            value: 1.7

  - id: conclusion
    text: "Power vs. Progress"
    map:
      center: [78.9629, 22.5937]
      zoom: 4.2
      pitch: 0
      bearing: 0
      opacity: 0.45

  - id: methodology
    text: "Methodology & Sources"
    map:
      center: [78.9629, 20.5937]
      zoom: 3.0
      pitch: 0
      bearing: 0
      opacity: 0.20