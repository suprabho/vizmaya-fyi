# Story config — europe-ai-adoption-2026
#
# Two indicators, one map. Map beats trace Eurostat's early-2026 release on
# individuals' use of AI tools in the preceding three months. The story now
# pairs that with Eurostat's youth (16-29) social-network use figures plus an
# Ofcom UK supplement, so each act compares both waves on the same continent.
# The opening choropleth keeps the AI ramp; later beats zoom into the Nordic
# and Baltic lead, the Mediterranean split (Malta / Cyprus / Greece vs Italy
# / Turkey), the lagging large economies (Germany, UK, France), the youth
# social-media floor (Cyprus 98.3 ceiling, Italy 80.3 floor), and the eastern
# edge — where the two waves come apart most sharply (Balkans top on social,
# bottom on AI).
#
# COORDINATES (capitals):
#   Oslo, Norway             10.7522, 59.9139
#   Copenhagen, Denmark      12.5683, 55.6761
#   Bern, Switzerland         7.4474, 46.9480
#   Tallinn, Estonia         24.7536, 59.4370
#   Helsinki, Finland        24.9384, 60.1699
#   Valletta, Malta          14.5146, 35.8997
#   Nicosia, Cyprus          33.3823, 35.1856
#   Athens, Greece           23.7275, 37.9838
#   Rome, Italy              12.4964, 41.9028
#   Ankara, Turkey           32.8541, 39.9334
#   Berlin, Germany          13.4050, 52.5200
#   Paris, France             2.3522, 48.8566
#   London, UK               -0.1278, 51.5074
#   Madrid, Spain            -3.7038, 40.4168
#   Lisbon, Portugal         -9.1393, 38.7223
#   Warsaw, Poland           21.0122, 52.2297
#   Bucharest, Romania       26.1025, 44.4268
#   Sofia, Bulgaria          23.3219, 42.6977
#   Skopje, North Macedonia  21.4254, 41.9981
#   Belgrade, Serbia         20.4489, 44.7872
#
# AI choropleth ramp (share of residents using AI in last three months, %):
#   [18, 30, 42, 56]  →  [$red, $surface, $accent2, $accent]
#   Red = bottom tier, surface = mid-band, purple → cyan = top tier.
#
# Social-media ramp (share of 16-29-year-olds using social networks, %):
#   [80, 88, 92, 97]  →  [$red, $surface, $accent2, $accent]
#   Same color tokens, narrower band — only used where the section spotlights
#   the social-media indicator (cyprus-stat, italy-stat).

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#5ac8d4"
  pinRadius: 12
  flySpeed: 1.2
  mapPalette:
    land: "#0f1419"
    water: "#0a1018"
    border: "#2a3545"
    labelText: "#c8d1dc"
    labelHalo: "#0a1018"

sections:

  # ═══════════════════════════════════════════════
  # HERO
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "Mapped: Europe's Two Digital Waves"
    eyebrow: "Technology · April 2026"
    map:
      center: [15.0, 54.0]
      zoom: 3.1
      pitch: 0
      bearing: 0
      opacity: 0.45

  # ═══════════════════════════════════════════════
  # OPENING STAT — 56.3% (Norway)
  # ═══════════════════════════════════════════════

  - id: norway-stat
    kind: stat
    text: "56.3%"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [10.7522, 60.5]
      zoom: 4.6
      pitch: 25
      bearing: 0
      opacity: 0.60
      pins:
        - coordinates: [10.7522, 59.9139]
          label: "Oslo — 56.3% AI · 95.7% social"
          color: "#5ac8d4"
      regions:
        level: country
        ramp: [40, 58]
        colors: ["$accent2", "$accent"]
        items:
          - code: "NO"
            value: 56.3

  - id: continent-tiers
    text: "A continent splitting in tiers"
