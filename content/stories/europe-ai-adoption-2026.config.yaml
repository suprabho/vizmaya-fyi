          - code: "RO"
            value: 17.8

  # ═══════════════════════════════════════════════
  # ACT I — NORDIC & BALTIC LEAD
  # ═══════════════════════════════════════════════

  - id: act-i
    text: "Act I: The Nordic and Baltic lead"
    chart: data:top-adopters
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [18.0, 60.0]
      zoom: 3.8
      pitch: 15
      bearing: 0
      opacity: 0.60
      pins:
        - coordinates: [10.7522, 59.9139]
          label: "Oslo — 56.3%"
          color: "#5ac8d4"
        - coordinates: [12.5683, 55.6761]
          label: "Copenhagen — 48.4%"
          color: "#5ac8d4"
          labelAnchor: bottom
        - coordinates: [24.7536, 59.4370]
          label: "Tallinn — 46.6%"
          color: "#5ac8d4"
      regions:
        level: country
        ramp: [40, 58]
        colors: ["$accent2", "$accent"]
        items:
          - code: "NO"
            value: 56.3
          - code: "DK"
            value: 48.4
          - code: "EE"
            value: 46.6
          - code: "FI"
