        - coordinates: [46.6753, 24.7136]
          label: "Riyadh — 3.1% forecast"
          color: "#d8a14a"
        - coordinates: [56.2500, 26.5700]
          label: "Strait of Hormuz"
          color: "#c65a3a"
          labelAnchor: right
        - coordinates: [38.0582, 24.0895]
          label: "Yanbu — East-West pipeline terminus"
          color: "#4f8a6a"
          labelAnchor: left
      regions:
        level: country
        ramp: [0, 7]
        colors: ["$surface", "$amber"]
        items:
          - code: "SA"
            value: 3.1

  # ═══════════════════════════════════════════════
