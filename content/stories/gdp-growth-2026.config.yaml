# Story config — gdp-growth-2026
#
# The reader walks through the 2026 IMF ranking. The camera starts on a
# world view with a growth choropleth, descends into Delhi (the top of the
# chart), Jakarta (the quiet #2), Beijing (the managed #3), then east to
# Riyadh and the Strait of Hormuz (the biggest downgrade, mitigated by the
# East-West pipeline). Act II flies over Washington, London/Berlin,
# Tokyo/Rome — the advanced-economy floor. Act III holds over the middle
# band (Warsaw, Istanbul, Madrid) before a final world view.
#
# COORDINATES (capitals / focal cities):
#   New Delhi, India         77.2090, 28.6139
#   Jakarta, Indonesia      106.8456, -6.2088
#   Beijing, China          116.4074, 39.9042
#   Riyadh, Saudi Arabia     46.6753, 24.7136
#   Strait of Hormuz         56.2500, 26.5700
#   Yanbu (Red Sea)          38.0582, 24.0895  (East-West pipeline terminus)
#   Washington DC, USA      -77.0369, 38.9072
#   Tokyo, Japan            139.6917, 35.6895
#   Rome, Italy              12.4964, 41.9028
#   Berlin, Germany          13.4050, 52.5200
#   London, UK               -0.1276, 51.5074
#   Paris, France             2.3522, 48.8566
#   Amsterdam, Netherlands    4.9041, 52.3676
#   Madrid, Spain            -3.7038, 40.4168
#   Warsaw, Poland           21.0122, 52.2297
#   Ankara, Türkiye          32.8541, 39.9334
#   Istanbul, Türkiye        28.9784, 41.0082
#   Canberra, Australia     149.1300, -35.2809
#   Brasilia, Brazil        -47.9292, -15.7801
#   Mexico City, Mexico     -99.1332, 19.4326
#   Ottawa, Canada          -75.6972, 45.4215
#   Seoul, South Korea      126.9780, 37.5665
#   Moscow, Russia           37.6173, 55.7558
#
# Choropleth ramp is shared across the world-view beats:
#   [0.5, 1.5, 2.5, 4.5, 6.5]  →  [$accent2 (teal), $surface, $amber, $accent, $red]
# Low growth = cool teal; high growth = warm accent/red.

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#d8a14a"
  pinRadius: 12
  flySpeed: 1.2

sections:

  # ═══════════════════════════════════════════════
  # HERO
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "The Growth That Moved East"
    eyebrow: "Global Macro · April 2026"
    map:
      center: [50.0, 20.0]
      zoom: 1.7
      pitch: 0
      bearing: 0
      opacity: 0.45

  # ═══════════════════════════════════════════════
  # OPENING STAT — 6.5% (India)
  # ═══════════════════════════════════════════════

  - id: india-top
    kind: stat
    text: "6.5%"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [77.2090, 22.0]
      zoom: 4.2
      pitch: 25
      bearing: 0
      opacity: 0.60
      pins:
        - coordinates: [77.2090, 28.6139]
          label: "New Delhi — 6.5% forecast"
          color: "#d8a14a"
      regions:
        level: country
        ramp: [0, 7]
        colors: ["$surface", "$red"]
        items:
          - code: "IN"
            value: 6.5
      mobile:
        center: [78.0, 22.0]
        zoom: 3.6

  - id: list-inverted
    text: "The list, quietly inverted"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [50.0, 25.0]
      zoom: 1.7
      pitch: 0
      bearing: 0
      opacity: 0.55
      regions:
        level: country
        ramp: [0.5, 1.5, 2.5, 4.5, 6.5]
        colors: ["$accent2", "$surface", "$amber", "$accent", "$red"]
        items:
          - code: "IN"
            value: 6.5
          - code: "ID"
            value: 5.0
          - code: "CN"
            value: 4.4
          - code: "TR"
            value: 3.4
          - code: "PL"
            value: 3.3
          - code: "SA"
            value: 3.1
          - code: "US"
            value: 2.3
          - code: "ES"
            value: 2.1
          - code: "AU"
            value: 2.0
          - code: "BR"
            value: 1.9
          - code: "KR"
            value: 1.9
          - code: "MX"
            value: 1.6
          - code: "CA"
            value: 1.5
          - code: "NL"
            value: 1.2
          - code: "RU"
            value: 1.1
          - code: "FR"
            value: 0.9
          - code: "GB"
            value: 0.8
          - code: "DE"
            value: 0.8
          - code: "JP"
            value: 0.7
          - code: "IT"
            value: 0.5

  # ═══════════════════════════════════════════════
  # ACT I — THE FAST HALF OF THE WORLD
  # ═══════════════════════════════════════════════

  - id: act-i
    text: "Act I: The fast half of the world"
    chart: data:top-growers
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [80.0, 15.0]
      zoom: 2.3
      pitch: 0
      bearing: 0
      opacity: 0.35
      regions:
        level: country
        ramp: [2.5, 4.5, 6.5]
        colors: ["$amber", "$accent", "$red"]
        items:
          - code: "IN"
            value: 6.5
          - code: "ID"
            value: 5.0
          - code: "CN"
            value: 4.4
          - code: "TR"
            value: 3.4
          - code: "PL"
            value: 3.3
          - code: "SA"
            value: 3.1
          - code: "US"
            value: 2.3
          - code: "ES"
            value: 2.1

  - id: indonesia-stat
    kind: stat
    text: "5.0%"
    mobileParagraphs:
      - [0, 1]
      - [1, 2]
    map:
      center: [110.0, -2.0]
      zoom: 4.0
      pitch: 25
      bearing: 0
      opacity: 0.60
      pins:
        - coordinates: [106.8456, -6.2088]
