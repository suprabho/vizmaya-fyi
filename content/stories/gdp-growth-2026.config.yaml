    map:
      center: [70.0, 40.0]
      zoom: 1.9
      pitch: 0
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [139.6917, 35.6895]
          label: "Tokyo — 0.7%"
          color: "#4f8a6a"
        - coordinates: [12.4964, 41.9028]
