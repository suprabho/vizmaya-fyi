# Story config — housing-trends-europe
#
# Map beats trace Eurostat's 2024 dwelling-type release. The opening
# choropleth colours each country by its share of residents living in
# houses; later beats zoom into the outliers (Ireland, Netherlands,
# Eastern Europe), the apartment majority (Germany, Italy, Spain,
# Switzerland), and the steepest shifts since 2010 (Malta, Portugal,
# Norway). The closing beats pull back to a Europe-wide change
# choropleth.
#
# COORDINATES (capitals):
#   Dublin, Ireland          -6.2603, 53.3498
#   Amsterdam, Netherlands    4.8952, 52.3676
#   Brussels, Belgium         4.3517, 50.8503
#   Skopje, North Macedonia  21.4254, 41.9981
#   Zagreb, Croatia          15.9819, 45.8150
#   Budapest, Hungary        19.0402, 47.4979
#   Berlin, Germany          13.4050, 52.5200
#   Rome, Italy              12.4964, 41.9028
#   Madrid, Spain            -3.7038, 40.4168
#   Bern, Switzerland         7.4474, 46.9480
#   Valletta, Malta          14.5146, 35.8997
#   Lisbon, Portugal         -9.1393, 38.7223
#   Porto, Portugal          -8.6291, 41.1579
#   Oslo, Norway             10.7522, 59.9139
#   Helsinki, Finland        24.9384, 60.1699
#   Warsaw, Poland           21.0122, 52.2297
#
# Choropleth ramps:
#   Snapshot ramp (share living in houses, 2024):
#     [33, 50, 75, 92]  →  [$accent2, $surface, $amber, $accent]
#     Teal = apartment-majority, warm amber → accent = house-majority.
#   Shift ramp (percentage-point change 2010 → 2024):
#     [-15, -5, 0, 6]   →  [$red, $accent2, $surface, $positive]
#     Red / teal = falling house-share, green = rising.

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#c77a48"
  pinRadius: 12
  flySpeed: 1.2

sections:

  # ═══════════════════════════════════════════════
  # HERO
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "The Shrinking European House"
    eyebrow: "Housing · April 2026"
    map:
      center: [15.0, 52.0]
      zoom: 3.1
      pitch: 0
      bearing: 0
      opacity: 0.45

  # ═══════════════════════════════════════════════
  # OPENING STAT — 51.4% (Europe-wide house share)
  # ═══════════════════════════════════════════════

  - id: europe-share
    kind: stat
    text: "51.4%"
