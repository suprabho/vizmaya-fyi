      - [0, 1]
      - [1, 2]
    map:
      center: [15.0, 51.0]
      zoom: 3.2
      pitch: 0
      bearing: 0
      opacity: 0.60
      regions:
        level: country
        ramp: [33, 50, 75, 92]
        colors: ["$accent2", "$surface", "$amber", "$accent"]
