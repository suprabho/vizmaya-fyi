# Story config — press-freedom-2026
#
# Source: RSF 2026 World Press Freedom Index — https://rsf.org/en/index
# Data: vizmaya-data/2026.csv  (regenerate items[] with scripts/rsf-csv-to-yaml.mjs)
#
# CHOROPLETH DIRECTION (important):
#   Higher RSF score = MORE press freedom.
#   Ramp goes red (low/repressed) → through neutral → green/accent (high/free).
#   This is INVERTED from typical "danger ramp" intuition. Verify on first paint
#   that Norway (92.7) shows green and China (13.9) shows red.
#
# Choropleth ramp (used in hero/closing/intros):
#   [15, 35, 55, 75, 90]  →  [$red, $amber, $surface, $accent2, $accent]
#
# CAPITALS / FOCAL CITIES:
#   Oslo               10.7522, 59.9139
#   Tallinn            24.7536, 59.4370
#   Vilnius            25.2797, 54.6872
#   Amsterdam           4.9041, 52.3676
