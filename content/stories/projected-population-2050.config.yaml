# Story config — projected-population-2050
#
# Map beats trace the UN medium-fertility projection 2025–2050: a global
# choropleth reveals sub-Saharan Africa as the only region doing the work,
# then the camera descends to Kinshasa (the single biggest grower), the
# Sahel (Niger/Chad/Mali), and rebounds across Beijing → Delhi, Rome →
# Athens, Kyiv → Chisinau, and Tokyo to show the contracting world.
#
# COORDINATES (capitals / focal cities):
#   Kinshasa, DRC            15.2663,  -4.4419
#   Bangui, CAR              18.5582,   4.3947
#   Niamey, Niger             2.1098,  13.5116
#   N'Djamena, Chad          15.0557,  12.1348
#   Bamako, Mali             -8.0029,  12.6392
#   Khartoum, Sudan          32.5599,  15.5007
#   Luanda, Angola           13.2343,  -8.8383
#   Mogadishu, Somalia       45.3182,   2.0469
#   Lagos, Nigeria            3.3792,   6.5244
#   New Delhi, India         77.2090,  28.6139
#   Beijing, China          116.4074,  39.9042
#   Tokyo, Japan            139.6917,  35.6895
#   Seoul, South Korea      126.9780,  37.5665
#   Rome, Italy              12.4964,  41.9028
#   Athens, Greece           23.7275,  37.9838
#   Kyiv, Ukraine            30.5234,  50.4501
#   Chisinau, Moldova        28.8638,  47.0105
#   Sofia, Bulgaria          23.3219,  42.6977
#   Vilnius, Lithuania       25.2797,  54.6872
#   Sarajevo, BiH            18.4131,  43.8563
#
# Choropleth ramp is shared across the world-view beats:
#   [-22, -5, 0, 30, 95]  →  [$accent2 (teal), $surface, $surface, $amber, $accent]
# Teal = shrinking, warm ramber → accent = growing.

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#e07b39"
  pinRadius: 12
  flySpeed: 1.2

