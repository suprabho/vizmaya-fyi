# Story config — persistent-map architecture v2.
#
# ARCHITECTURE PRINCIPLES:
#   1. One location = one scroll beat. Pins arrive one at a time.
#   2. Pins accumulate within a section cluster (previous pins persist).
#   3. subsections[] = same map state, chart steps forward. Use for charts only.
#   4. Separate top-level sections = different map centre. Use for location reveals.
#   5. Every text: value must exactly match a ## heading in the markdown file.
#   6. kind: stat  → renders heading as a giant number.
#   7. kind: hero  → animated title entrance.
#
# COORDINATE SOURCES: verified against satellite imagery + OpenStreetMap.
#   SK Hynix Icheon M16 fab        127.4350,  37.2720
#   SK Hynix Cheongju M15X fab     127.7137,  36.6370
#   Samsung Pyeongtaek P3/P4       127.0823,  37.0793
#   HD Hyundai Ulsan HHI           129.3110,  35.5400
#   Samsung Heavy Industries Geoje 128.6210,  34.8820
#   Hanwha Ocean Geoje             128.6800,  34.8600
#   Ras Laffan Industrial City      51.5488,  25.8972
#   Strait of Hormuz (centre)       56.2700,  26.5700
#   Abu Dhabi (UAE crude)           54.3660,  24.4660
#   Futtsu LNG Terminal Japan      139.8650,  35.3140
#   CNOOC Tianjin LNG              117.7870,  38.9820
#   Gate Terminal Rotterdam          4.0180,  51.9580
#   Sabine Pass LNG Louisiana      -93.8680,  29.7310
#   Mundra LNG Terminal India       69.7060,  22.8380
#   Hudong-Zhonghua Shanghai       121.4990,  31.3050
#   Amur GPP Russia                141.0490,  53.3200
#   Federal Helium Reserve Amarillo-101.8310, 35.2220
#   NVIDIA HQ Santa Clara         -121.9630,  37.3700
#   AWS us-east-1 Ashburn VA       -77.4770,  39.0440
#   TSMC Hsinchu Science Park      120.9680,  24.7930

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#D85A30"
  pinRadius: 12
  flySpeed: 1.2
  highlightCountry: "KR"
  highlightColor: "#D85A30"

sections:

  # ═══════════════════════════════════════════════
  # HERO
  # ═══════════════════════════════════════════════

  - id: hero
    kind: hero
    text: "South Korea Makes the Memory and Builds the Ships"
    eyebrow: "The Asymmetry Letter · Cost Analysis · March 2026"
    map:
      center: [127.5, 36.5]
      zoom: 4.8
      pitch: 25
      bearing: 0
      opacity: 0.45

  # ═══════════════════════════════════════════════
  # GPU HOUR ANCHOR — the baseline price. Map opens on Santa Clara.
  # ═══════════════════════════════════════════════

  - id: gpu-anchor
    kind: stat
    text: "$2.49"
    paragraphs: [0, 3]         # desktop: all 6 paragraphs, one snap
    mobileParagraphs:           # mobile: 2 snaps
    - [0, 1]
    - [1, 2]
    - [2, 3]
    map:
      center: [-121.963, 37.370]
      zoom: 9.0
      pitch: 20
      bearing: 0
      opacity: 0.55
      pins:
        - coordinates: [-121.963, 37.370]
          label: "NVIDIA HQ — Santa Clara"
          color: "#155dfc"

  # ═══════════════════════════════════════════════
  # THE CRASH — map flies to Seoul
  # ═══════════════════════════════════════════════

  - id: crash-context
    text: "The crash nobody expected"
