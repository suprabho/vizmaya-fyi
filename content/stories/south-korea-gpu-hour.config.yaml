      zoom: 8.0
      pitch: 25
      bearing: 0
      opacity: 0.50
      pins:
        - coordinates: [126.978, 37.566]
          label: "Seoul — KOSPI"
          color: "#E24B4A"

  - id: market-crash
    kind: stat
    text: "18%"
