    map:
      center: [128.5, 35.3]
      zoom: 6.5
      pitch: 30
      bearing: 10
      opacity: 0.5

  # ─── Slow bleed: Korean yards carry the Act IV visual via the persistent map.
  # Main's editorial rewrite dropped the feedback-loop SVG ("map carries the
  # visual") so this section has no chart panel — the three subsections share
  # a single map state focused on the Korean shipbuilding cluster (Ulsan +
  # Geoje), with Qatar pinned as the LNG customer at risk.
  - id: slow-bleed
    map:
      center: [128.95, 35.2]
      zoom: 6.5
      pitch: 45
      bearing: 15
      opacity: 0.6
      pins:
        - coordinates: [129.31, 35.54]
          label: "HD Hyundai — Ulsan"
          color: "#1D9E75"
        - coordinates: [128.62, 34.88]
          label: "Samsung Heavy + Hanwha — Geoje"
