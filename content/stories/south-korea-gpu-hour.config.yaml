# Story config for the persistent-map architecture.
#
# Each `text` ref points at a heading in south-korea-gpu-hour.md (case-insensitive,
# em-dash tolerant). Use ` > ` to walk into a subheading.
#
# A section may either:
#   - have its own `text` (one viewport-tall snap target), OR
#   - have a `subsections:` array — each becomes its own snap target while
#     SHARING the parent's map state, chart, and chart instance. The subsection's
#     index drives the chart's `activeStep`, so chart animations resume smoothly
#     between scrolls instead of re-mounting.
#
# Paragraph slicing: `paragraphs: N` (or `[start, end]`) on a section or
# subsection pulls only that paragraph index from the resolved anchor. We use
# this so each chart step reveals its OWN bullet from a multi-bullet anchor —
# instead of re-rendering the whole text block per step (which created the
# repeated-paragraphs duplication callouts in the previous review).
#
# kind: stat → renders the heading as a giant number.
# kind: hero → renders the pretext-styled animated title.
#
# Theme colors live in the markdown frontmatter — not here.

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.55
  pinColor: "#D85A30"
  pinRadius: 12
  flySpeed: 1.2
  highlightCountry: "KR"
  highlightColor: "#D85A30"

sections:
  # ─── Hero: pretext-styled animated title ───
  - id: hero
    kind: hero
    text: "South Korea Makes the Memory and Builds the Ships"
    eyebrow: "The Asymmetry Letter · Cost Analysis · March 2026"
    map:
      center: [128, 34.5]
      zoom: 6.2
      pitch: 25
      bearing: 0
      opacity: 0.45

  # ─── 18% — big-number stat. Empty paragraph slice keeps the panel
  # caption-free — the giant 18% IS the message, and the "18%" section's
  # paragraphs are reserved for the next viewport's stock chart steps. ───
  - id: market-crash-stat
    kind: stat
    text: "18%"
    paragraphs: [0, 0]
    map:
      center: [128, 34.5]
      zoom: 6.2
      pitch: 30
      bearing: 0
      opacity: 0.45
      pins:
        - coordinates: [127.0, 37.56]
          label: "Seoul — KOSPI"
          color: "#E24B4A"

  # ─── Stock candlestick: 2026 vs 2008 (2 chart steps).
  # Step 0 = first paragraph of "18%" (the headline crash).
  # Step 1 = second paragraph (the "invisible crisis" hand-off into Act I). ───
  - id: stock-history
    chart: stock-candlestick
    map:
      center: [128, 34.5]
      zoom: 6.2
      pitch: 30
      opacity: 0.45
      pins:
        - coordinates: [127.0, 37.56]
          label: "Seoul"
          color: "#E24B4A"
    subsections:
      - text: "18%"
        paragraphs: 0
      - text: "18%"
        paragraphs: 1

  # ─── Act I opener — the 3 intro paragraphs of "## Act I". No chart;
  # this is the prose hand-off into the triple-exposure visual. ───
  - id: act-i-intro
    text: "Act I"
    map:
      center: [128, 34.5]
      zoom: 5.5
      pitch: 20
      opacity: 0.5

  # ─── Triple exposure → polar chart (3 chart steps, 3 commodity bullets).
  # Each subsection slices ONE paragraph (one commodity bullet) from the
  # "triple exposure" section so the bullets reveal one-by-one as the polar
  # chart advances Oil → Gas → Helium. ───
  - id: triple-exposure
    chart: polar-exposure
    map:
      center: [85, 28]
      zoom: 2.8
      pitch: 0
      opacity: 0.5
      pins:
        - coordinates: [49.5, 27.0]
          label: "Middle East crude"
          color: "#EF9F27"
        - coordinates: [51.53, 25.97]
          label: "Qatar — gas + helium"
          color: "#1D9E75"
        - coordinates: [127.0, 37.56]
          label: "Korean fabs"
          color: "#D85A30"
    subsections:
      - text: "Act I > The triple exposure"
        paragraphs: 0   # Oil
      - text: "Act I > The triple exposure"
        paragraphs: 1   # Gas (LNG)
      - text: "Act I > The triple exposure"
        paragraphs: 2   # Helium

  # ─── Memory dominance → HBM/DRAM treemap (3 chart steps).
  # The "memory dominance" markdown has 3 paragraphs — perfect for 3 steps. ───
  - id: memory-dominance
    chart: hbm-treemap
    map:
      center: [127.2, 37.0]
      zoom: 7.5
      pitch: 45
      bearing: -10
      opacity: 0.6
      pins:
        - coordinates: [127.435, 37.272]
          label: "Icheon (SK Hynix)"
          color: "#D85A30"
        - coordinates: [127.4847, 36.6424]
          label: "Cheongju (SK Hynix)"
          color: "#D85A30"
        - coordinates: [127.0823, 37.0793]
          label: "Pyeongtaek (Samsung)"
          color: "#D85A30"
    subsections:
      - text: "Act I > The memory dominance"
        paragraphs: 0
      - text: "Act I > The memory dominance"
        paragraphs: 1
      - text: "Act I > The memory dominance"
        paragraphs: 2

  # ─── Shipbuilding dominance → LNG carrier treemap (2 chart steps).
  # The "shipbuilding dominance" markdown has 3 paragraphs. We use the first
  # two as the chart-step bullets. The "one grid, all exposed" anchor lives
  # on its own next, as the closing paragraph that ties Act I together. ───
  - id: shipbuilding-dominance
    chart: lng-treemap
    map:
      center: [128.95, 35.2]
      zoom: 7
      pitch: 50
      bearing: 15
      opacity: 0.65
      pins:
        - coordinates: [129.31, 35.54]
          label: "Ulsan (HD Hyundai)"
          color: "#1D9E75"
        - coordinates: [128.62, 34.88]
          label: "Geoje (Samsung Heavy / Hanwha)"
          color: "#1D9E75"
    subsections:
      - text: "Act I > The shipbuilding dominance"
        paragraphs: 0
      - text: "Act I > The shipbuilding dominance"
        paragraphs: 1

  # ─── Act I closer: "One grid, all exposed" — text-only bridge to Act II.
  # Renders without a chart so the persistent map (Korea wide-shot) carries
  # the visual while the prose drives the hand-off. ───
  - id: one-grid
    text: "Act I > One grid, all exposed"
    map:
      center: [128, 36]
      zoom: 5.5
      pitch: 15
      opacity: 0.5

  # ─── Act II opener ───
  - id: act-ii-intro
    text: "Act II"
    map:
      center: [54, 26]
      zoom: 5
      pitch: 30
      bearing: -20
      opacity: 0.5

  # ─── Helium price chart (3 chart steps, 3 subsections — one per beat).
  # Each helium sub-anchor has multiple paragraphs in the markdown; we slice
  # to ONE paragraph per chart step so the text doesn't bloat the panel and
  # the bullets advance in lockstep with the chart's title. ───
  - id: helium-arc
    chart: helium-price
    map:
      center: [51.53, 25.97]
      zoom: 7
      pitch: 35
      bearing: -15
      opacity: 0.65
      pins:
        - coordinates: [51.53, 25.97]
          label: "Ras Laffan"
          color: "#1D9E75"
        - coordinates: [56.27, 26.57]
          label: "Strait of Hormuz"
          color: "#E24B4A"
    subsections:
      - text: "Act II > The misleading spike"
      - text: "Act II > The 6-month inflection"
      - text: "Act II > The stockpile runway"

  # ─── Act III opener ───
  - id: act-iii-intro
    text: "Act III"
    map:
      center: [127.0, 37.56]
      zoom: 5.5
      pitch: 0
      opacity: 0.5

  # ─── DRAM bar chart → backward-looking case. 4 chart steps, mapped to
  # the historical buildup beats: trendline opener → 3.4× spike → driver
  # was AI not war → pre-existing fire (DRAM +172% before Hormuz). Each
  # step pulls one paragraph so the case builds visibly with the bars. ───
  - id: dram-arc
    chart: dram-price
    map:
      center: [127.5, 37.0]
      zoom: 6.5
      pitch: 25
      opacity: 0.5
      pins:
        - coordinates: [127.0823, 37.0793]
          label: "Samsung Pyeongtaek"
          color: "#D85A30"
    subsections:
      - text: "Act III > The trendline"
        paragraphs: 0
      - text: "Act III > The trendline"
        paragraphs: 1
      - text: "Act III > The trendline"
        paragraphs: 3
      - text: "Act III > The pre-existing fire"
        paragraphs: 0

  # ─── DDR5 area chart → forward-looking scenarios. 5 chart steps mapped
  # to "what happens next" (intro + 3 scenarios) + the stress-test closer.
  # No overlap with the DRAM chart above — this one is the FUTURE story. ───
  - id: ddr5-arc
    chart: ddr5-area
    map:
      center: [120, 30]
      zoom: 3.5
      opacity: 0.4
    subsections:
      - text: "Act III > What happens next"
        paragraphs: 0
      - text: "Act III > What happens next"
        paragraphs: 1
      - text: "Act III > What happens next"
        paragraphs: 2
      - text: "Act III > What happens next"
        paragraphs: 3
      - text: "Act III > The assumption nobody is stress-testing"

  # ─── Act IV opener ───
  - id: act-iv-intro
    text: "Act IV"
    map:
      center: [128.5, 35.3]
      zoom: 6.5
      pitch: 30
      bearing: 10
      opacity: 0.5

  # ─── Slow bleed: Korean yards carry the Act IV visual via the persistent
  # map. Main's editorial rewrite dropped the feedback-loop SVG so this
  # section has no chart panel. Three subsections share a single map state
  # focused on the Korean shipbuilding cluster (Ulsan + Geoje), with Qatar
  # pinned as the LNG customer at risk. Each pulls its own anchor — no
  # paragraph slicing because each anchor is already a single tight beat. ───
  - id: slow-bleed
    map:
      center: [128.95, 35.2]
      zoom: 6.5
      pitch: 45
      bearing: 15
      opacity: 0.6
      pins:
        - coordinates: [129.31, 35.54]
          label: "HD Hyundai — Ulsan"
          color: "#1D9E75"
        - coordinates: [128.62, 34.88]
          label: "Samsung Heavy + Hanwha — Geoje"
          color: "#1D9E75"
        - coordinates: [51.5, 25.3]
          label: "Qatar — LNG customer at risk"
          color: "#E24B4A"
    subsections:
      - text: "Act IV > One causal step"
      - text: "Act IV > Where Korean ships go"
      - text: "Act IV > The signal to watch now"

  # ─── What to watch — one paragraph (audience bullet) per snap target.
  # Three subsections, each pulling one paragraph of the same anchor. ───
  - id: what-to-watch-procurement
    text: "What to watch"
    paragraphs: 0
    heading: "What to watch · Procurement"
    map:
      center: [80, 25]
      zoom: 2.2
      opacity: 0.35

  - id: what-to-watch-investors
    text: "What to watch"
    paragraphs: 1
    heading: "What to watch · Investors"
    map:
      center: [80, 25]
      zoom: 2.2
      opacity: 0.35

  - id: what-to-watch-builders
    text: "What to watch"
    paragraphs: 2
    heading: "What to watch · AI builders"
    map:
      center: [80, 25]
      zoom: 2.2
      opacity: 0.35

  # ─── Methodology ───
  - id: methodology
    text: "Methodology"
    map:
      center: [60, 20]
      zoom: 1.6
      opacity: 0.3
