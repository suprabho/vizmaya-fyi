      center: [126.978, 37.566]
      zoom: 7.5
      pitch: 30
      bearing: 0
      opacity: 0.50
      pins:
        - coordinates: [126.978, 37.566]
          label: "Seoul — KOSPI −18%"
          color: "#E24B4A"

  # Stock candlestick chart — 2 steps, map stays on Seoul
