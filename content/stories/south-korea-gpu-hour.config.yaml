      - text: "Act I > One grid, all exposed"

  # ─── Act II opener ───
  - id: act-ii-intro
    text: "Act II"
    map:
      center: [54, 26]
      zoom: 5
      pitch: 30
      bearing: -20
      opacity: 0.5

  # ─── Helium price chart (3 chart steps, 3 subsections — perfect 1:1) ───
