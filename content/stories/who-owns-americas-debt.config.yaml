# Story config — who-owns-americas-debt
# Minimal config for debugging

defaults:
  mapStyle: mapbox://styles/mapbox/dark-v11
  mapOpacity: 0.5
  pinColor: "#4a9eff"
  pinRadius: 10
  flySpeed: 1.2
  mapPalette:
    land: "#0d1b2a"
    water: "#061220"
    border: "#1f3a52"
    labelText: "#c8d1dc"
    labelHalo: "#061220"

sections:

  - id: total-debt
    kind: stat
    text: "$39 Trillion"
    mobileParagraphs:
      - [0, 2]
      - [2, 3]
    map:
      center: [-95.0, 40.0]
      zoom: 3.5
      pitch: 0
      bearing: 0
      opacity: 0.4

  - id: public-debt-split
    text: "$31.4 Trillion held by the public"
    mobileParagraphs:
      - [0, 2]
      - [2, 4]
    map:
      center: [-95.0, 40.0]
      zoom: 3.5
      pitch: 0
      bearing: 0
      opacity: 0.4

  - id: public-debt
    text: "The Domestic Majority"
    mobileParagraphs:
      - [0, 2]
      - [2, 4]
    map:
      center: [-95.0, 40.0]
      zoom: 3.5
      pitch: 0
      bearing: 0
      opacity: 0.4
