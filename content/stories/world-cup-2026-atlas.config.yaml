# Story config — world-cup-2026-atlas
#
# The reader walks across the 48-team field of the 2026 World Cup, but
# never as a football tournament. The arc instead reads the qualifying
# list as a sample of the world: scale (Curaçao vs the United States),
# squad-value-to-GDP residuals (Portugal, Croatia, Senegal, Morocco
# above the line; Saudi Arabia, Iran, Egypt below), regime spectrum
# (15 full / 14 flawed / 7 hybrid / 10 authoritarian), and the four
# debutants. The camera opens on the world, dips into Willemstad,
# Lisbon, Riyadh, and the MENA belt, and pulls back to the full
# bracket as census.
#
# COORDINATES (capital / focal points):
#   Washington DC, USA        -77.0369, 38.9072
#   Willemstad, Curaçao       -68.9728, 12.1224
#   Lisbon, Portugal           -9.1393, 38.7223
#   Zagreb, Croatia            15.9819, 45.8150
#   Dakar, Senegal            -17.4441, 14.6928
#   Rabat, Morocco             -6.8498, 33.9716
#   Riyadh, Saudi Arabia       46.6753, 24.7136
#   Tehran, Iran               51.3890, 35.6892
#   Cairo, Egypt               31.2357, 30.0444
#   Doha, Qatar                51.5310, 25.2854
#   Amman, Jordan              35.9106, 31.9544
#   Tashkent, Uzbekistan       69.2401, 41.2995
#   Praia, Cape Verde         -23.5087, 14.9330
#
# REGION RAMPS used in this story:
#   Squad value (€mn) :  [20, 100, 300, 600, 1300] → [$surface, $accent2, $teal, $amber, $accent]
#   Confederation     :  [1, 2, 3, 4, 5, 6]        → [UEFA gold, CONMEBOL red, CAF green, AFC blue, CONCACAF teal, OFC amber]
#   EIU 2024 score    :  [0, 4, 6, 8, 10]          → [$red, $amber, $teal, $positive, $positive]

